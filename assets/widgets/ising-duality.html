<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ising Duality Widget</title>
<style>
  html, body { background: #000; margin: 0; }
  #ising-widget {
    --bg: #0b0b0b;
    --panel: #111;
    --ink: #f5f5f5;
    --muted: #9ca3af;
    --line: rgba(255,255,255,0.12);
    --line-soft: rgba(255,255,255,0.06);
    --accent: #58a6ff;
    --accent-bg: rgba(88,166,255,0.15);
    --spin-up: #93c5fd;       /* cyan */
    --spin-dn: #1f2937;       /* near-black */
    --wall: #fca5a5;          /* soft red */
    --curve-T: #93c5fd;       /* cyan, matches T panel */
    --curve-Tstar: #fbbf24;   /* amber, matches T* panel */
    --good: #86efac;
    --warn: #fca5a5;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    color: var(--ink);
    background: linear-gradient(180deg, rgba(20,20,20,0.9), rgba(10,10,10,0.95));
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px 18px;
    max-width: 880px;
    margin: 1em auto;
    line-height: 1.45;
    font-size: 14px;
    box-sizing: border-box;
  }
  #ising-widget * { box-sizing: border-box; }
  #ising-widget h3 {
    margin: 0 0 8px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.02em;
  }
  #ising-widget .lattices {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  @media (max-width: 640px) {
    #ising-widget .lattices { grid-template-columns: 1fr; }
  }
  #ising-widget .panel {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
  }
  #ising-widget .panel .title-row {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-bottom: 6px;
  }
  #ising-widget .panel .title-row .T-val { color: var(--ink); font-family: ui-monospace, monospace; text-transform: none; letter-spacing: 0; }
  #ising-widget canvas.lattice {
    display: block;
    width: 100%;
    height: auto;
    aspect-ratio: 1 / 1;
    image-rendering: pixelated;
    image-rendering: -moz-crisp-edges;
    background: #000;
    border-radius: 4px;
  }
  #ising-widget .diag {
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 8px;
    margin-bottom: 10px;
  }
  #ising-widget .controls {
    display: grid;
    grid-template-columns: 1fr;
    gap: 8px;
    margin-top: 8px;
  }
  #ising-widget .ctrl-row { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }
  #ising-widget label.tiny {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.04em;
  }
  #ising-widget input[type="range"] {
    flex: 1;
    min-width: 160px;
    accent-color: var(--accent);
  }
  #ising-widget .seg {
    display: inline-flex;
    border: 1px solid var(--line);
    border-radius: 6px;
    overflow: hidden;
  }
  #ising-widget .seg button {
    background: transparent;
    color: var(--muted);
    border: 0;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #ising-widget .seg button.on { background: var(--accent-bg); color: var(--ink); }
  #ising-widget button.action {
    background: transparent;
    color: var(--ink);
    border: 1px solid var(--line);
    border-radius: 6px;
    padding: 4px 10px;
    font-size: 12px;
    cursor: pointer;
  }
  #ising-widget button.action:hover { background: var(--accent-bg); }
  #ising-widget .readout {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    color: var(--ink);
    font-size: 12px;
  }
  #ising-widget .readout .muted { color: var(--muted); }
</style>
</head>
<body>
<div id="ising-widget">
  <h3>2D Ising — Phases, Power Laws, and Duality</h3>

  <div class="lattices">
    <div class="panel">
      <div class="title-row">
        <span>Lattice @ T</span>
        <span class="T-val" id="T-readout">T = —</span>
      </div>
      <canvas class="lattice" id="canvas-T" width="96" height="96"></canvas>
    </div>
    <div class="panel">
      <div class="title-row">
        <span>Lattice @ T* (dual)</span>
        <span class="T-val" id="Tstar-readout">T* = —</span>
      </div>
      <canvas class="lattice" id="canvas-Tstar" width="96" height="96"></canvas>
    </div>
  </div>

  <div class="diag" id="diag-corr">
    <div class="title-row" style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">
      <span>Connected correlator C(r) — log-log</span>
      <span class="readout" id="eta-readout">η = —</span>
    </div>
    <svg id="svg-corr" viewBox="0 0 600 180" preserveAspectRatio="none" style="width:100%;height:auto;display:block"></svg>
  </div>

  <div class="diag" id="diag-xi">
    <div class="title-row" style="display:flex;justify-content:space-between;font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:6px">
      <span>ξ(T) — accumulating trace</span>
      <span class="readout" id="xi-readout">ξ = —</span>
    </div>
    <svg id="svg-xi" viewBox="0 0 600 140" preserveAspectRatio="none" style="width:100%;height:auto;display:block"></svg>
  </div>

  <div class="controls">
    <div class="ctrl-row">
      <label class="tiny" for="slider-T">Temperature</label>
      <input type="range" id="slider-T" min="1.0" max="4.0" step="0.005" value="2.269">
      <span class="readout" id="slider-readout">T = 2.269</span>
    </div>
    <div class="ctrl-row">
      <svg id="svg-phase" viewBox="0 0 600 28" preserveAspectRatio="none" style="width:100%;height:28px;display:block"></svg>
    </div>
    <div class="ctrl-row">
      <label class="tiny">View</label>
      <div class="seg" id="seg-view">
        <button data-view="spins" class="on">spins</button>
        <button data-view="walls">walls</button>
        <button data-view="both">both</button>
      </div>
      <label class="tiny" style="margin-left:auto">Dynamics</label>
      <div class="seg" id="seg-dyn">
        <button data-dyn="wolff" class="on">Wolff</button>
        <button data-dyn="metro">Metropolis</button>
      </div>
      <label class="tiny">Speed</label>
      <div class="seg" id="seg-speed">
        <button data-speed="1">1×</button>
        <button data-speed="4" class="on">4×</button>
        <button data-speed="16">16×</button>
      </div>
      <button class="action" id="btn-pause">pause</button>
      <button class="action" id="btn-reset">reset</button>
    </div>
  </div>
</div>
<script>
(function () {
  'use strict';

  // Physical constants
  const TC = 2 / Math.log(1 + Math.sqrt(2));   // ≈ 2.26918531...
  const BETA_C = Math.log(1 + Math.sqrt(2)) / 2; // ≈ 0.44068679...

  // Kramers-Wannier duality on temperature.
  // sinh(2 beta) * sinh(2 beta*) = 1, beta = 1/T.
  // => beta* = (1/2) * arcsinh(1 / sinh(2 beta))
  // => T*    = 2 / arcsinh(1 / sinh(2/T))
  function dualT(T) {
    const s = Math.sinh(2 / T);
    if (!isFinite(s) || s <= 0) return Infinity;
    const inv = 1 / s;
    const x = Math.asinh(inv);
    if (x === 0) return Infinity;
    return 2 / x;
  }

  // Self-tests for dualT (analytic invariants).
  (function selfTestDualT() {
    const eps = 1e-9;
    // Self-dual at Tc.
    console.assert(Math.abs(dualT(TC) - TC) < eps,
      `dualT(Tc) should equal Tc, got ${dualT(TC)}`);
    // Involution: dualT(dualT(T)) = T.
    for (const T of [1.2, 1.8, 2.0, 2.5, 3.0, 3.5]) {
      console.assert(Math.abs(dualT(dualT(T)) - T) < 1e-7,
        `dualT involution failed at T=${T}: got ${dualT(dualT(T))}`);
    }
    // Low T <-> high T: dualT of a low T should be high.
    console.assert(dualT(1.0) > TC,
      `dualT(1.0) should be > Tc, got ${dualT(1.0)}`);
    console.assert(dualT(4.0) < TC,
      `dualT(4.0) should be < Tc, got ${dualT(4.0)}`);
    console.log('[ising-widget] dualT self-tests passed; Tc =', TC.toFixed(6));
  })();

  // 2D Ising lattice with periodic boundary conditions.
  // Spins stored as Int8Array of values in {+1, -1}.
  class Lattice {
    constructor(L, T) {
      this.L = L;
      this.N = L * L;
      this.T = T;
      this.beta = 1 / T;
      this.s = new Int8Array(this.N);
      // Random initial state.
      for (let i = 0; i < this.N; i++) this.s[i] = Math.random() < 0.5 ? 1 : -1;
    }

    setT(T) {
      this.T = T;
      this.beta = 1 / T;
    }

    idx(x, y) {
      // Wrap to [0, L) with periodic BCs.
      const L = this.L;
      return ((y % L) + L) % L * L + ((x % L) + L) % L;
    }

    // Sum of 4 nearest neighbours of site (x, y).
    nnSum(x, y) {
      const L = this.L;
      const s = this.s;
      const xp = (x + 1) % L, xm = (x - 1 + L) % L;
      const yp = (y + 1) % L, ym = (y - 1 + L) % L;
      return s[y * L + xp] + s[y * L + xm] + s[yp * L + x] + s[ym * L + x];
    }

    // Total magnetisation per site.
    magnetisation() {
      let m = 0;
      for (let i = 0; i < this.N; i++) m += this.s[i];
      return m / this.N;
    }

    // Energy per site: E = -J sum_<ij> s_i s_j, with J=1.
    // Each bond counted once.
    energy() {
      const L = this.L;
      const s = this.s;
      let e = 0;
      for (let y = 0; y < L; y++) {
        for (let x = 0; x < L; x++) {
          const sij = s[y * L + x];
          const sR = s[y * L + ((x + 1) % L)];
          const sD = s[((y + 1) % L) * L + x];
          e -= sij * (sR + sD);
        }
      }
      return e / this.N;
    }

    // Connected two-point function C(r) = <s_0 s_r> - <s>^2, averaged along
    // both lattice axes for separations r = 1..rmax. Returns Float64Array of
    // length rmax+1; index 0 is variance ≈ 1 - m^2.
    connectedCorrelator(rmax) {
      const L = this.L, s = this.s, N = this.N;
      const out = new Float64Array(rmax + 1);
      let m = 0;
      for (let i = 0; i < N; i++) m += s[i];
      m /= N;
      // Sum of s_i * s_{i+r} for each separation r along x and y, then
      // average and subtract m^2.
      for (let r = 0; r <= rmax; r++) {
        let sum = 0;
        for (let y = 0; y < L; y++) {
          for (let x = 0; x < L; x++) {
            const sij = s[y * L + x];
            // +x neighbour at distance r
            sum += sij * s[y * L + ((x + r) % L)];
            // +y neighbour at distance r
            sum += sij * s[((y + r) % L) * L + x];
          }
        }
        out[r] = sum / (2 * N) - m * m;
      }
      return out;
    }

    // One Metropolis sweep = N flip attempts.
    sweepMetropolis() {
      const L = this.L, N = this.N, s = this.s, beta = this.beta;
      for (let k = 0; k < N; k++) {
        const x = (Math.random() * L) | 0;
        const y = (Math.random() * L) | 0;
        const i = y * L + x;
        const dE = 2 * s[i] * this.nnSum(x, y);  // +2 * s_i * h_i
        if (dE <= 0 || Math.random() < Math.exp(-beta * dE)) {
          s[i] = -s[i];
        }
      }
    }

    // One Wolff cluster update: grow a cluster of aligned spins from a random
    // seed, add neighbours with probability p = 1 - exp(-2 beta J), flip whole
    // cluster at the end. Beats critical slowing down near Tc.
    sweepWolff() {
      const L = this.L, s = this.s, beta = this.beta;
      const padd = 1 - Math.exp(-2 * beta);
      const x0 = (Math.random() * L) | 0;
      const y0 = (Math.random() * L) | 0;
      const seedSpin = s[y0 * L + x0];
      const stack = [y0 * L + x0];
      const inCluster = new Uint8Array(this.N);
      inCluster[y0 * L + x0] = 1;
      while (stack.length) {
        const i = stack.pop();
        const x = i % L, y = (i / L) | 0;
        const neighbours = [
          y * L + ((x + 1) % L),
          y * L + ((x - 1 + L) % L),
          ((y + 1) % L) * L + x,
          ((y - 1 + L) % L) * L + x,
        ];
        for (const j of neighbours) {
          if (!inCluster[j] && s[j] === seedSpin && Math.random() < padd) {
            inCluster[j] = 1;
            stack.push(j);
          }
        }
      }
      for (let i = 0; i < this.N; i++) if (inCluster[i]) s[i] = -s[i];
    }

    // Fill with all spin up. Useful for tests and as a "cold" start.
    fillAligned(value = 1) {
      this.s.fill(value);
    }
  }

  (function selfTestLattice() {
    const L = 16;
    const lat = new Lattice(L, 2.0);

    // Aligned state has m = ±1 and energy per site = -2 (each site contributes
    // -2J from two outgoing bonds).
    lat.fillAligned(1);
    console.assert(Math.abs(lat.magnetisation() - 1) < 1e-12,
      `aligned-up m should be 1, got ${lat.magnetisation()}`);
    console.assert(Math.abs(lat.energy() - (-2)) < 1e-12,
      `aligned energy/site should be -2, got ${lat.energy()}`);

    lat.fillAligned(-1);
    console.assert(Math.abs(lat.magnetisation() - (-1)) < 1e-12,
      `aligned-down m should be -1, got ${lat.magnetisation()}`);
    console.assert(Math.abs(lat.energy() - (-2)) < 1e-12,
      `aligned-down energy/site should be -2, got ${lat.energy()}`);

    // Half-and-half stripes: half of bonds frustrated, energy should be 0.
    for (let y = 0; y < L; y++)
      for (let x = 0; x < L; x++)
        lat.s[y * L + x] = (x % 2 === 0) ? 1 : -1;
    console.assert(Math.abs(lat.energy() - 0) < 1e-12,
      `striped energy/site should be 0, got ${lat.energy()}`);

    // At very high T, Metropolis should drive m toward 0 from a cold start.
    lat.setT(100);
    lat.fillAligned(1);
    for (let i = 0; i < 50; i++) lat.sweepMetropolis();
    console.assert(Math.abs(lat.magnetisation()) < 0.2,
      `at T=100 after 50 sweeps from aligned start, |m| should be ~0, got ${lat.magnetisation()}`);

    // At very low T, from a random start Metropolis should grow |m| toward 1.
    const lat2 = new Lattice(L, 0.5);
    for (let i = 0; i < 200; i++) lat2.sweepMetropolis();
    console.assert(Math.abs(lat2.magnetisation()) > 0.9,
      `at T=0.5 after 200 sweeps, |m| should be > 0.9, got ${lat2.magnetisation()}`);

    // Wolff: at very low T (T < Tc), |m| should saturate from a random start
    // within a small number of sweeps (no critical slowing down).
    const wlow = new Lattice(L, 1.0);
    for (let i = 0; i < 30; i++) wlow.sweepWolff();
    console.assert(Math.abs(wlow.magnetisation()) > 0.95,
      `Wolff at T=1.0 after 30 sweeps: |m| should be > 0.95, got ${wlow.magnetisation()}`);

    // Wolff: at very high T (T >> Tc), |m| should stay near 0.
    const whigh = new Lattice(L, 6.0);
    for (let i = 0; i < 30; i++) whigh.sweepWolff();
    console.assert(Math.abs(whigh.magnetisation()) < 0.4,
      `Wolff at T=6.0 after 30 sweeps: |m| should be < 0.4, got ${whigh.magnetisation()}`);

    // Connected correlator on an all-aligned lattice should be 0 at every r
    // (variance is 0).
    const lc = new Lattice(8, 2.0);
    lc.fillAligned(1);
    const c0 = lc.connectedCorrelator(4);
    for (let r = 0; r <= 4; r++) {
      console.assert(Math.abs(c0[r]) < 1e-12,
        `aligned C(${r}) should be 0, got ${c0[r]}`);
    }
    // On a striped lattice (x even = +1, x odd = -1), m = 0; C(r) = 1 for
    // even r, -1 for odd r along x, but along y C(r) = 1 for all r. The
    // average is (1 + (-1)^r) / 2.
    for (let y = 0; y < 8; y++)
      for (let x = 0; x < 8; x++)
        lc.s[y * 8 + x] = (x % 2 === 0) ? 1 : -1;
    const c1 = lc.connectedCorrelator(4);
    for (let r = 0; r <= 4; r++) {
      const expected = (1 + ((-1) ** r)) / 2;  // 1, 0, 1, 0, 1
      console.assert(Math.abs(c1[r] - expected) < 1e-12,
        `striped C(${r}) should be ${expected}, got ${c1[r]}`);
    }

    console.log('[ising-widget] Lattice self-tests passed');
  })();

  // ---------- Configuration ----------
  const L = 96;
  const PALETTE = {
    spinUp:   [0x93, 0xc5, 0xfd, 255],  // cyan, --spin-up
    spinDn:   [0x1f, 0x29, 0x37, 255],  // near-black, --spin-dn
    spinUpDim:[0x93, 0xc5, 0xfd, 100],
    spinDnDim:[0x1f, 0x29, 0x37, 100],
    wall:     [0xfc, 0xa5, 0xa5, 255],  // soft red, --wall
  };

  // ---------- Spin renderer ----------
  // Draw spins as 1 pixel per site on a Canvas of native size L x L; CSS scales
  // it up with `image-rendering: pixelated`.
  function drawSpins(ctx, lat, mode /* 'spins' | 'walls' | 'both' */) {
    const L = lat.L, s = lat.s;
    const img = ctx.createImageData(L, L);
    const data = img.data;
    if (mode === 'spins' || mode === 'both') {
      const up = mode === 'both' ? PALETTE.spinUpDim : PALETTE.spinUp;
      const dn = mode === 'both' ? PALETTE.spinDnDim : PALETTE.spinDn;
      for (let i = 0; i < L * L; i++) {
        const c = s[i] === 1 ? up : dn;
        const k = i * 4;
        data[k] = c[0]; data[k+1] = c[1]; data[k+2] = c[2]; data[k+3] = c[3];
      }
    } else {
      // Walls-only: dark background.
      for (let i = 0; i < L * L; i++) {
        const k = i * 4;
        data[k] = 11; data[k+1] = 11; data[k+2] = 11; data[k+3] = 255;
      }
    }
    ctx.putImageData(img, 0, 0);
    // Walls overlay drawn in Task 9; for now this function ignores them.
  }

  // ---------- App state ----------
  const state = {
    lat: new Lattice(L, parseFloat(document.getElementById('slider-T').value)),
    latStar: null,                            // initialised below
    view: 'spins',
    dyn: 'wolff',
    speed: 4,
    paused: false,
  };
  state.latStar = new Lattice(L, dualT(state.lat.T));

  const canvasT = document.getElementById('canvas-T');
  const canvasTstar = document.getElementById('canvas-Tstar');
  const ctxT = canvasT.getContext('2d');
  const ctxTstar = canvasTstar.getContext('2d');
  // Disable smoothing so pixelated rendering survives the CSS upscale.
  ctxT.imageSmoothingEnabled = false;
  ctxTstar.imageSmoothingEnabled = false;

  const slider = document.getElementById('slider-T');
  const sliderReadout = document.getElementById('slider-readout');
  const tReadout = document.getElementById('T-readout');
  const tStarReadout = document.getElementById('Tstar-readout');

  function fmt(x, d=3) { return Number(x).toFixed(d); }

  function updateReadouts() {
    const T = state.lat.T, Ts = state.latStar.T;
    sliderReadout.textContent = `T = ${fmt(T)}`;
    tReadout.textContent = `T = ${fmt(T)}`;
    tStarReadout.textContent = isFinite(Ts) ? `T* = ${fmt(Ts)}` : 'T* = ∞';
  }

  slider.addEventListener('input', () => {
    const T = parseFloat(slider.value);
    state.lat.setT(T);
    state.latStar.setT(dualT(T));
    updateReadouts();
  });

  // ---------- SVG plot for C(r) ----------
  const svgCorr = document.getElementById('svg-corr');
  const etaReadout = document.getElementById('eta-readout');
  const CORR_VB_W = 600, CORR_VB_H = 180;
  const CORR_MARGIN = { l: 36, r: 12, t: 8, b: 26 };
  const RMAX = L / 2;  // 48
  // log-log axes: x in [1, RMAX], y in [1e-3, 1].
  const xLog = (r) => {
    const u = Math.log10(r) / Math.log10(RMAX);  // [0, 1]
    return CORR_MARGIN.l + u * (CORR_VB_W - CORR_MARGIN.l - CORR_MARGIN.r);
  };
  const yLog = (c) => {
    const v = c <= 0 ? 1 : (Math.log10(c) + 3) / 3;  // [-3, 0] -> [0, 1]
    const yPx = CORR_MARGIN.t + (1 - Math.max(0, Math.min(1, v))) * (CORR_VB_H - CORR_MARGIN.t - CORR_MARGIN.b);
    return yPx;
  };

  function drawCorrAxes() {
    let s = '';
    // Frame.
    s += `<rect x="${CORR_MARGIN.l}" y="${CORR_MARGIN.t}" width="${CORR_VB_W - CORR_MARGIN.l - CORR_MARGIN.r}" height="${CORR_VB_H - CORR_MARGIN.t - CORR_MARGIN.b}" fill="none" stroke="rgba(255,255,255,0.12)"/>`;
    // x ticks at 1, 2, 4, 8, 16, 32.
    for (const r of [1, 2, 4, 8, 16, 32]) {
      const x = xLog(r);
      s += `<line x1="${x}" y1="${CORR_VB_H - CORR_MARGIN.b}" x2="${x}" y2="${CORR_VB_H - CORR_MARGIN.b + 4}" stroke="rgba(255,255,255,0.5)"/>`;
      s += `<text x="${x}" y="${CORR_VB_H - 8}" fill="#9ca3af" font-size="10" text-anchor="middle">${r}</text>`;
    }
    s += `<text x="${(CORR_VB_W) / 2}" y="${CORR_VB_H - 0}" fill="#9ca3af" font-size="10" text-anchor="middle">r</text>`;
    // y ticks at 1, 0.1, 0.01, 0.001.
    for (const c of [1, 0.1, 0.01, 0.001]) {
      const y = yLog(c);
      s += `<line x1="${CORR_MARGIN.l - 4}" y1="${y}" x2="${CORR_MARGIN.l}" y2="${y}" stroke="rgba(255,255,255,0.5)"/>`;
      s += `<text x="${CORR_MARGIN.l - 6}" y="${y + 3}" fill="#9ca3af" font-size="10" text-anchor="end">${c}</text>`;
    }
    // Reference slope r^{-1/4} anchored at (r=1, C=1).
    const xRef = [];
    for (const r of [1, 2, 4, 8, 16, 32, 48]) xRef.push([xLog(r), yLog(Math.pow(r, -0.25))]);
    s += `<polyline points="${xRef.map(p => p.join(',')).join(' ')}" fill="none" stroke="rgba(252,165,165,0.5)" stroke-dasharray="3 3"/>`;
    s += `<text x="${xLog(48)}" y="${yLog(Math.pow(48, -0.25)) - 4}" fill="#fca5a5" font-size="10" text-anchor="end">slope -1/4</text>`;
    return s;
  }

  function corrPath(arr, colour) {
    let pts = [];
    for (let r = 1; r <= RMAX; r++) {
      const c = Math.abs(arr[r]);
      if (c > 1e-4) pts.push([xLog(r), yLog(c)]);
    }
    if (pts.length < 2) return '';
    return `<polyline points="${pts.map(p => p.join(',')).join(' ')}" fill="none" stroke="${colour}" stroke-width="1.5"/>`;
  }

  // Takes precomputed correlator arrays (so the loop doesn't double-compute).
  function drawCorrPlot(cT, cS) {
    let svg = drawCorrAxes();
    svg += corrPath(cT, '#93c5fd');
    svg += corrPath(cS, '#fbbf24');
    svgCorr.innerHTML = svg;
    // Display approximate η from a 2-point log-log slope between r=2 and r=8.
    const r1 = 2, r2 = 8;
    const y1 = cT[r1], y2 = cT[r2];
    if (y1 > 1e-3 && y2 > 1e-3) {
      const eta = -(Math.log(y2) - Math.log(y1)) / (Math.log(r2) - Math.log(r1));
      etaReadout.textContent = `η ≈ ${eta.toFixed(2)}`;
    } else {
      etaReadout.textContent = `η ≈ —`;
    }
  }

  // ---------- Main loop ----------
  let frameCount = 0;
  function step() {
    if (state.paused) return;
    const sweepsPerFrame = state.speed;
    for (let k = 0; k < sweepsPerFrame; k++) {
      if (state.dyn === 'wolff') {
        state.lat.sweepWolff();
        state.latStar.sweepWolff();
      } else {
        state.lat.sweepMetropolis();
        state.latStar.sweepMetropolis();
      }
    }
    drawSpins(ctxT, state.lat, state.view);
    drawSpins(ctxTstar, state.latStar, state.view);
    if ((frameCount++ % 6) === 0) {
      const cT = state.lat.connectedCorrelator(RMAX);
      const cS = state.latStar.connectedCorrelator(RMAX);
      drawCorrPlot(cT, cS);
    }
  }

  function loop() {
    step();
    requestAnimationFrame(loop);
  }

  updateReadouts();
  drawSpins(ctxT, state.lat, state.view);
  drawSpins(ctxTstar, state.latStar, state.view);
  {
    const cT0 = state.lat.connectedCorrelator(RMAX);
    const cS0 = state.latStar.connectedCorrelator(RMAX);
    drawCorrPlot(cT0, cS0);
  }
  requestAnimationFrame(loop);

  console.log('[ising-widget] main loop running');
})();
</script>
</body>
</html>
